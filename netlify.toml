# arcCRM v3

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# Hourly Katana sync
[functions.sync]
  schedule = "@hourly"

# Daily Dropbox Excel sync
[functions.sync-dropbox-excel]
  schedule = "@daily"

# Environment variables (Netlify dashboard → Site config → Env vars):
# KATANA_API_KEY          — Katana API key (sk-...)
# CLICKUP_API_KEY         — ClickUp API token (pk_...)
# CLICKUP_SPACE_ID        — ClickUp Sales space ID
# GITHUB_TOKEN            — GitHub personal access token (repo scope)
# GITHUB_REPO             — forestearly4/arccrm
# GITHUB_BRANCH           — main
# DROPBOX_REFRESH_TOKEN  — long-lived refresh token (preferred, never expires)
# DROPBOX_APP_KEY        — your Dropbox app key (flybmmazoumvluk)
# DROPBOX_APP_SECRET     — your Dropbox app secret
# DROPBOX_TOKEN          — (alternative) short-lived access token
# DROPBOX_PRICING_PATH   — (optional) default: /arccrm/pricing.xlsx
# DROPBOX_CUSTOMERS_PATH — (optional) default: /arccrm/customers.xlsx
# SMTP_USER                   — Office 365 email (e.g. you@yourdomain.com)
# SMTP_PASS                   — Office 365 password or app password
# SMTP_FROM                   — Sender (e.g. "arcCRM <you@domain.com>")
# CLICKUP_PRODUCTION_LIST_ID  — ClickUp list ID for production tasks
