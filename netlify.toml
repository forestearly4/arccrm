# arcCRM v3
# Katana: inventory + SO status only
# ClickUp: bidirectional sales space sync
# Customers + Products: managed in GitHub JSON files

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Hourly auto-sync
[functions.sync]
  schedule = "@hourly"

# Environment variables (set in Netlify dashboard):
# KATANA_API_KEY     — Katana API key (sk-...)
# CLICKUP_API_KEY    — ClickUp API token (pk_...)
# CLICKUP_SPACE_ID   — ClickUp Sales space ID
# GITHUB_TOKEN       — GitHub personal access token (repo scope)
# GITHUB_REPO        — forestearly4/arccrm
# GITHUB_BRANCH      — main
