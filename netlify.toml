# arcCRM — Netlify config
# Sync function calls Katana REST API server-side (no CORS issues)
# then writes katana-data.json to GitHub repo

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Auto-sync Katana every hour
[functions.sync]
  schedule = "@hourly"

# Environment variables — set in Netlify dashboard → Site config → Environment variables:
# KATANA_API_KEY   → your Katana API key (sk-...)
# GITHUB_TOKEN     → GitHub personal access token (repo scope)
# GITHUB_REPO      → forestearly4/arccrm
# GITHUB_BRANCH    → main
